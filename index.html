<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW_15_pre_post</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <main>
        <section class="team">
            <div class="container">
                
                <header class="team__header">
                    <span class="team__subtitle">THE GENIUSES BEHIND OUR WORK</span>
                    <h2 class="team__title">Our Team</h2>
                    <div class="team__divider">
                        <img src="./assets/img/bonfire-sharp01.svg" alt="divider icon">
                    </div>
                </header>

                <div class="team__body">
                    
                    <div class="team__visual">
                        <div class="team__image-box">
                            <img src="./assets/img/photo.png" alt="Sahariar Kabir" class="team__photo">
                        </div>
                    </div>

                    <article class="team__content">
                        <h3 class="team__name">Sahariar Kabir</h3>
                        <p class="team__position">Frontend Developer</p>
                        
                        <div class="team__socials">
                            <a href="#" class="team__social-link" aria-label="Facebook">
                                <i class="fa-brands fa-facebook-f"></i>
                            </a>
                            <a href="#" class="team__social-link" aria-label="Twitter">
                                <i class="fa-brands fa-twitter"></i>
                            </a>
                            <a href="#" class="team__social-link" aria-label="Google Plus">
                                <i class="fa-brands fa-google-plus-g"></i>
                            </a>
                            <a href="#" class="team__social-link" aria-label="LinkedIn">
                                <i class="fa-brands fa-linkedin-in"></i>
                            </a>
                        </div>

                        <p class="team__text">
                            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Duis cursus dui sit amet ligula efficitur, sit amet lacinia massa dictum. Etiam accumsan felis a nunc facilisis, ut euismod lacus placerat.
                        </p>

                        <div class="team__status">
                            <img src="./assets/img/bonfire-sharp02.svg" alt="status icon">
                        </div>

                        <a href="#" class="team__button">View Profile</a>
                    </article>

                </div>
            </div>
        </section>
    </main>

</body>
</html>
